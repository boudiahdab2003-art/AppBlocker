# Cloud version of Publish.bat: bump the version, build the signed APK, tag,
# and publish a GitHub release the in-app updater picks up.
#
# Trigger it from the Actions tab ("Publish release" -> "Run workflow"), or ask
# Claude to trigger it. Requires four repository secrets (Settings -> Secrets
# and variables -> Actions), taken from keystore.properties on the dev PC:
#   KEYSTORE_BASE64   - the keystore file itself, base64-encoded
#   KEYSTORE_PASSWORD - storePassword
#   KEY_ALIAS         - keyAlias
#   KEY_PASSWORD      - keyPassword
name: Publish release

on:
  workflow_dispatch:
    inputs:
      note:
        description: "What changed in this version?"
        required: false
        default: "Bug fixes and improvements."

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOTE: ${{ inputs.note }}
      # Release key fingerprint; a mismatch means updates wouldn't install over
      # the existing app, so the build is rejected (same check as publish.ps1).
      RELEASE_CERT: 027953856e2a387cb2618b3b2e2cd35e119e3416d6b551aeff3cb9d09148b0e1
    steps:
      - name: Check secrets are configured
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=""
          [ -z "$KEYSTORE_BASE64" ]   && missing="$missing KEYSTORE_BASE64"
          [ -z "$KEYSTORE_PASSWORD" ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "$KEY_ALIAS" ]         && missing="$missing KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ]      && missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secret(s):$missing - add them under Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Write signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          {
            echo "storeFile=release.keystore"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Bump version
        id: bump
        run: |
          set -e
          old_code=$(grep -oP 'versionCode\s*=\s*\K\d+' app/build.gradle.kts)
          old_name=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          new_code=$((old_code + 1))
          new_name="${old_name%.*}.$(( ${old_name##*.} + 1 ))"
          sed -i "s/versionCode = $old_code/versionCode = $new_code/" app/build.gradle.kts
          sed -i "s/versionName = \"$old_name\"/versionName = \"$new_name\"/" app/build.gradle.kts
          echo "tag=v$new_name" >> "$GITHUB_OUTPUT"
          echo "name=$new_name" >> "$GITHUB_OUTPUT"
          echo "Bumped $old_name (code $old_code) -> $new_name (code $new_code)"

      - name: Build signed APK
        run: gradle -p . assembleGithubRelease

      - name: Verify release signature
        run: |
          set -e
          apk=app/build/outputs/apk/github/release/app-github-release.apk
          [ -f "$apk" ] || { echo "::error::Build finished but no APK was produced."; exit 1; }
          bt=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          fp=$("$bt/apksigner" verify --print-certs "$apk" \
            | grep -oiP 'certificate SHA-256 digest:\s*\K[0-9a-f]+' | head -1)
          if [ "$fp" != "$RELEASE_CERT" ]; then
            echo "::error::APK signed with the WRONG key ($fp) - publishing would break in-place updates."
            exit 1
          fi
          cp "$apk" AppBlocker.apk

      - name: Update changelog, commit and tag
        run: |
          set -e
          tag="${{ steps.bump.outputs.tag }}"
          python3 - "$tag" <<'EOF'
          import sys, os
          tag, note = sys.argv[1], os.environ.get("NOTE") or "Bug fixes and improvements."
          with open("CHANGELOG.md") as f: cl = f.read()
          entry = f"## {tag}\n- {note}\n\n"
          i = cl.find("## ")
          cl = cl[:i] + entry + cl[i:] if i >= 0 else cl.rstrip() + "\n\n" + entry
          with open("CHANGELOG.md", "w") as f: f.write(cl)
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts CHANGELOG.md
          git commit -m "Release $tag"
          git tag "$tag"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "$tag"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.bump.outputs.tag }}"
          gh release create "$tag" AppBlocker.apk \
            --repo "${{ github.repository }}" -t "AppBlocker $tag" -n "$NOTE"
          echo "Release $tag is live: https://github.com/${{ github.repository }}/releases/latest"
