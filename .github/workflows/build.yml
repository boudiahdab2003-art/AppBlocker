# Compile check on every push: assembles the unsigned github-flavor debug APK so code
# changes are build-verified in the cloud (development environments can't always run
# Gradle locally). Releases are publish.yml's job — this never publishes anything.
name: Build check

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Run unit tests
        run: gradle -p . :app:testGithubDebugUnitTest

      - name: Assemble debug APK
        run: gradle -p . :app:assembleGithubDebug

      - name: Upload generated Room schema
        uses: actions/upload-artifact@v4
        with:
          name: room-schema-9
          path: app/schemas/com.appblocker.data.BlockerDatabase/9.json
