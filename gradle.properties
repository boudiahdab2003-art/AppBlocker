org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Faster rebuilds: keep a warm daemon, reuse task outputs, skip the config phase when
# nothing structural changed, and build modules in parallel.
org.gradle.daemon=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.parallel=true

# AI Coach server proxy (docs/SERVER.md #1). Leave BOTH empty to keep the coach on the
# user's own on-device Gemini key (current behaviour). Once the VM is up, set:
#   coachProxyUrl=https://<your-duckdns-name>.duckdns.org
#   coachProxySecret=<the shared secret in /etc/caddy/coach.env>
# and rebuild — the coach then works with no key. Rotating the secret = edit here + Caddy.
coachProxyUrl=
coachProxySecret=
